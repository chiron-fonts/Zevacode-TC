type: variable
cjk_font: embed_fonts/ZevHeiTC/VAR_TTF/ZevHeiTC-N-VF.ttf
blocks: assets/unicode_blocks.txt
source_root: source_fonts/monaspace_vf
downloads:
  - url: https://github.com/githubnext/monaspace/releases/download/v1.400/monaspace-variable-v1.400.zip
    include:
      - Variable Fonts/**/*.ttf
directory: ZevaCode-TC-Gimaspace-Variable
families:
  - name: argon
    source_filename: Monaspace Argon Var.ttf
    target_filename: ZevaCode-TC-{variant}-GimaspaceArg-Variable.ttf
    source_postscript_name: MonaspaceArgonVar
    target_postscript_name: ZevaCode-TC-{variant}-GimaspaceArg
    source_family_name: Monaspace Argon Var
    target_family_name: ZevaCode {variant} GimaspaceArg Variable
  - name: neon
    source_filename: Monaspace Neon Var.ttf
    target_filename: ZevaCode-TC-{variant}-GimaspaceNeo-Variable.ttf
    source_postscript_name: MonaspaceNeonVar
    target_postscript_name: ZevaCode-TC-{variant}-GimaspaceNeo
    source_family_name: Monaspace Neon Var
    target_family_name: ZevaCode {variant} GimaspaceNeo Variable
variants:
  Og:
    master_config: master_config/monaspace-s.json
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1000
  Al:
    # Monospace glyph width is 1240 :\
    master_config: master_config/monaspace-b.json
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1240
  