type: static
cjk_font: embed_fonts/ZevHeiTC/VAR_TTF/ZevHeiTC-N-VF.ttf
blocks: assets/unicode_blocks.txt
source_root: source_fonts/jetbrains_mono_static
downloads:
  - url: https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip
    include:
      - fonts/ttf/*.ttf
families:
  - directory_name: ZevaCode-TC-JetMono
    source_filename_prefix: JetBrainsMono
    target_filename_prefix: ZevaCode-TC-{variant}-JetMono
    source_postscript_name: JetBrainsMono
    target_postscript_name: ZevaCode-TC-{variant}-JetMono
    source_family_name: JetBrains Mono
    target_family_name: ZevaCode {variant} JetMono
    files:
      - glob: JetBrainsMono-*.ttf
  - skip: true
    directory_name: ZevaCode-TC-JetMonoNL
    source_filename_prefix: JetBrainsMonoNL
    target_filename_prefix: ZevaCode-TC-{variant}-JetMonoNL
    source_postscript_name: JetBrainsMonoNL
    target_postscript_name: ZevaCode-TC-{variant}-JetMonoNL
    source_family_name: JetBrains Mono NL
    target_family_name: ZevaCode {variant} JetMonoNL
    files:
      - glob: JetBrainsMonoNL-*.ttf
variants:
  Og:
    cjk_axis: "wdth=100,IDSP=0"
    italic:
      cjk_transform: "1,0,0.15838,1,0,0"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1000
  Al:
    # Monospace glyph width is 600.
    cjk_axis: "wdth=105,IDSP=150"
    italic:
      cjk_transform: "1,0,0.15838,1,0,0"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1200
weights:
  thin:
    cjk_axis_override: "wght=280"
  extralight:
    cjk_axis_override: "wght=330"
  light:
    cjk_axis_override: "wght=380"
  regular:
    cjk_axis_override: "wght=420"
  medium:
    cjk_axis_override: "wght=500"
  semibold:
    cjk_axis_override: "wght=600"
  bold:
    cjk_axis_override: "wght=700"
  extrabold:
    cjk_axis_override: "wght=800"
