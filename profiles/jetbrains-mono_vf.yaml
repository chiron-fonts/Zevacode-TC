type: variable
cjk_font: embed_fonts/ZevHeiTC/VAR_TTF/ZevHeiTC-N-VF.ttf
blocks: assets/unicode_blocks.txt
source_root: source_fonts/jetbrains_mono_vf
downloads:
  - url: https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip
    include:
      - fonts/variable/JetBrainsMono[wght].ttf
      - fonts/variable/JetBrainsMono-Italic[wght].ttf
directory: ZevaCode-TC-JetMono-Variable
families:
  - name: upright
    source_filename: JetBrainsMono[wght].ttf
    target_filename: ZevaCode-TC-{variant}-JetMono-Variable.ttf
    source_postscript_name: JetBrainsMono
    target_postscript_name: ZevaCode-TC-{variant}-JetMono
    source_family_name: JetBrains Mono
    target_family_name: ZevaCode {variant} JetMono Variable
  - name: italic
    source_filename: JetBrainsMono-Italic[wght].ttf
    italic: true
    target_filename: ZevaCode-TC-{variant}-JetMono-Italic-Variable.ttf
    source_postscript_name: JetBrainsMono
    target_postscript_name: ZevaCode-TC-{variant}-JetMono
    source_family_name: JetBrains Mono
    target_family_name: ZevaCode {variant} JetMono Variable
variants:
  Og:
    cjk_low: "wght=200,wdth=100,IDSP=0"
    cjk_high: "wght=800,wdth=100,IDSP=0"
    italic:
      cjk_transform: "1,0,0.15838,1,0,0"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1000
  Al:
    # Monospace glyph width is 600.
    cjk_low: "wght=200,wdth=110,IDSP=100"
    cjk_high: "wght=800,wdth=110,IDSP=100"
    italic:
      cjk_transform: "1,0,0.15838,1,0,0"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1200
