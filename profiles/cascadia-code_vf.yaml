type: variable
cjk_font: embed_fonts/ZevHeiTC/VAR_TTF/ZevHeiTC-N-VF.ttf
blocks: assets/unicode_blocks.txt
source_root: source_fonts/cascadia_code_vf
downloads:
  - url: https://github.com/microsoft/cascadia-code/releases/download/v2407.24/CascadiaCode-2407.24.zip
    include:
      - ttf/*.ttf
directory: ZevaCode-TC-CasCode-Variable
families:
  - name: upright
    source_filename: CascadiaCode.ttf
    target_filename: ZevaCode-TC-{variant}-CasCode-Variable.ttf
    source_postscript_name: CascadiaCode
    target_postscript_name: ZevaCode-TC-{variant}-CasCode
    source_family_name: Cascadia Code
    target_family_name: ZevaCode {variant} CasCode Variable
  - name: italic
    source_filename: CascadiaCodeItalic.ttf
    italic: true
    target_filename: ZevaCode-TC-{variant}-CasCode-Italic-Variable.ttf
    source_postscript_name: CascadiaCode
    target_postscript_name: ZevaCode-TC-{variant}-CasCode
    source_family_name: Cascadia Code
    target_family_name: ZevaCode {variant} CasCode Variable
  - name: upright
    source_filename: CascadiaMono.ttf
    target_filename: ZevaCode-TC-{variant}-CasMono-Variable.ttf
    source_postscript_name: CascadiaMono
    target_postscript_name: ZevaCode-TC-{variant}-CasMono
    source_family_name: Cascadia Mono
    target_family_name: ZevaCode {variant} CasMono Variable
  - name: italic
    source_filename: CascadiaMonoItalic.ttf
    italic: true
    target_filename: ZevaCode-TC-{variant}-CasMono-Italic-Variable.ttf
    source_postscript_name: CascadiaMono
    target_postscript_name: ZevaCode-TC-{variant}-CasMono
    source_family_name: Cascadia Mono
    target_family_name: ZevaCode {variant} CasMono Variable

