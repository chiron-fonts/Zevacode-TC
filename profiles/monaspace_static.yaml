type: static
cjk_font: embed_fonts/ZevHeiTC/VAR_OTF/ZevHeiTC-N-VF.otf
blocks: assets/unicode_blocks.txt
source_root: source_fonts/monaspace_static
downloads:
  - url: https://github.com/githubnext/monaspace/releases/download/v1.400/monaspace-static-v1.400.zip
    include:
      - Static Fonts/*/*.otf
families:
  - directory_name: ZevaCode-TC-GimaSpaceArg
    target_filename_prefix: ZevaCode-TC-{variant}-GimaSpaceArg
    source_filename_prefix: MonaspaceArgon
    source_postscript_name: MonaspaceArgon
    target_postscript_name: ZevaCode-TC-{variant}-GimaSpaceArg
    source_family_name: Monaspace Argon
    target_family_name: ZevaCode {variant} GimaSpaceArg
    ttf_companion: true
    files:
      - MonaspaceArgon-Regular.otf
      - MonaspaceArgon-Italic.otf
      - MonaspaceArgon-ExtraLight.otf
      - MonaspaceArgon-ExtraLightItalic.otf
      - MonaspaceArgon-Light.otf
      - MonaspaceArgon-LightItalic.otf
      - MonaspaceArgon-Medium.otf
      - MonaspaceArgon-MediumItalic.otf
      - MonaspaceArgon-SemiBold.otf
      - MonaspaceArgon-SemiBoldItalic.otf
      - MonaspaceArgon-Bold.otf
      - MonaspaceArgon-BoldItalic.otf
      - MonaspaceArgon-ExtraBold.otf
      - MonaspaceArgon-ExtraBoldItalic.otf
  - directory_name: ZevaCode-TC-GimaSpaceNeo
    target_filename_prefix: ZevaCode-TC-{variant}-GimaSpaceNeo
    source_filename_prefix: MonaspaceNeon
    source_postscript_name: MonaspaceNeon
    target_postscript_name: ZevaCode-TC-{variant}-GimaSpaceNeo
    source_family_name: Monaspace Neon
    target_family_name: ZevaCode {variant} GimaSpaceNeo
    ttf_companion: true
    files:
      - MonaspaceNeon-Regular.otf
      - MonaspaceNeon-Italic.otf
      - MonaspaceNeon-ExtraLight.otf
      - MonaspaceNeon-ExtraLightItalic.otf
      - MonaspaceNeon-Light.otf
      - MonaspaceNeon-LightItalic.otf
      - MonaspaceNeon-Medium.otf
      - MonaspaceNeon-MediumItalic.otf
      - MonaspaceNeon-SemiBold.otf
      - MonaspaceNeon-SemiBoldItalic.otf
      - MonaspaceNeon-Bold.otf
      - MonaspaceNeon-BoldItalic.otf
      - MonaspaceNeon-ExtraBold.otf
      - MonaspaceNeon-ExtraBoldItalic.otf
variants:
  Og:
    cjk_axis: "wdth=100,IDSP=0"
    cjk_transform: "2,0,0,2,0,5"
    italic:
      cjk_transform: "2,0,0.36,2,0,5"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1000
  Al:
    # Monospace glyph width is 1240 :\
    cjk_axis: "wdth=105,IDSP=190"
    cjk_transform: "2,0,0,2,0,5"
    italic:
      cjk_transform: "2,0,0.36,2,0,5"
    normalize_width:
      - codepoints: [[A960, A97F], [AC00, D7AF], [D7B0, D7FF]]
        width: 1240
weights:
  extralight:
    cjk_axis_override: "wght=300"
  light:
    cjk_axis_override: "wght=365"
  regular:
    cjk_axis_override: "wght=450"
  medium:
    cjk_axis_override: "wght=550"
  semibold:
    cjk_axis_override: "wght=650"
  bold:
    cjk_axis_override: "wght=750"
  extrabold:
    cjk_axis_override: "wght=850"
